name: Deploy to VPS

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (for example: v0.1.0)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment tag
        run: |
          if [ -z "${DEPLOY_TAG}" ]; then
            echo "DEPLOY_TAG is empty"
            exit 1
          fi

      - name: Deploy application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            # 强制同步远程 tags（允许覆盖），避免本地旧 tag 冲突
            git fetch --all --tags --prune --force
            # 删除可能存在的旧分支，避免 checkout 冲突
            git branch -D release-deploy 2>/dev/null || true
            git checkout "tags/${{ env.DEPLOY_TAG }}" -B release-deploy
            # pnpm 11 只执行 pnpm-workspace.yaml 的 onlyBuiltDependencies
            # allow-list（better-sqlite3、@prisma/engines、esbuild、prisma、
            # sharp），其余依赖的 install scripts 跳过，避免供应链风险。
            corepack pnpm install --frozen-lockfile
            # 先完成构建再迁移线上库：若 build 失败，set -e 中止，旧应用
            # 继续跑在旧 schema 上，不会出现"新 schema + 旧代码"的中间态。
            corepack pnpm run build
            # prisma migrate deploy 只需要 DATABASE_URL；用 grep/cut 提取而
            # 不 source 整个 .env.production，避免值里的 $ 等被 shell 展开。
            DATABASE_URL="$(grep '^DATABASE_URL=' .env.production | cut -d= -f2- | tr -d '"')" \
              corepack pnpm exec prisma migrate deploy
            # VPS 上还跑着 scheduling，不能 pm2 kill（会杀掉所有应用）。
            # 只重启本应用，pm2 save 会保留全部进程列表。
            export VPS_APP_DIR="${{ secrets.VPS_APP_DIR }}"
            pm2 startOrReload ecosystem.config.js --env production --update-env
            pm2 save
