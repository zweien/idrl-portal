name: Deploy to VPS

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (for example: v0.1.0)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment tag
        run: |
          if [ -z "${DEPLOY_TAG}" ]; then
            echo "DEPLOY_TAG is empty"
            exit 1
          fi

      - name: Deploy application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            # 强制同步远程 tags（允许覆盖），避免本地旧 tag 冲突
            git fetch --all --tags --prune --force
            # 删除可能存在的旧分支，避免 checkout 冲突
            git branch -D release-deploy 2>/dev/null || true
            git checkout "tags/${{ env.DEPLOY_TAG }}" -B release-deploy
            # pnpm 11 对 native build scripts（better-sqlite3、@prisma/engines
            # 等）需要非交互批准；allow-list 在 pnpm-workspace.yaml，下面的
            # flag 覆盖其余未列出的，保证部署不被交互提示卡住。
            corepack pnpm install --frozen-lockfile --config.dangerouslyAllowAllBuilds=true
            set -a
            source ./.env.production
            set +a
            # 先对线上 SQLite 应用迁移，再构建
            corepack pnpm exec prisma migrate deploy
            corepack pnpm run build
            # VPS 上还跑着 scheduling，不能 pm2 kill（会杀掉所有应用）。
            # 只重启本应用，pm2 save 会保留全部进程列表。
            pm2 startOrReload ecosystem.config.js --env production --update-env
            pm2 save
